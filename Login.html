<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BASTA Desserts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Satisfy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Login_styles.css">
</head>
<body class="pastel-gradient min-h-screen flex flex-col">

  <!-- Navigation Bar -->
  <nav class="bg-white shadow-md px-4 py-3">
    <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
      <div class="flex items-center mb-4 md:mb-0">
        <span class="logo-text text-3xl font-bold bg-clip-text text-transparent pastel-gradient"><a href="Landing.html">BASTA Desserts</a></span>
      </div>
      <div class="flex flex-wrap justify-center gap-2 md:gap-6">
        <button class="nav-button px-3 py-2 text-pink-400 font-medium"><a href="Landing.html">Home</a></button>
        <button class="nav-button px-3 py-2 text-yellow-400 font-medium"><a href="Recipes.html">Recipes</a></button>
        <button class="nav-button px-3 py-2 text-green-400 font-medium"><a href="Categories.html">Category</a></button>
        <button class="nav-button px-3 py-2 text-blue-400 font-medium"><a href="About.html">About Us</a></button>
        <button class="nav-button px-4 py-2 bg-purple-200 text-purple-600 rounded-full font-medium hover:bg-purple-300 transition"><a href="Login.html">Login/Sign Up</a></button>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <div class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="login-card bg-white rounded-2xl shadow-xl overflow-hidden max-w-md w-full">
      <div class="pastel-gradient h-3"></div>
      <div class="p-8">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-gray-800 mb-2">Welcome Back</h2>
          <p class="text-gray-600">Sign in to access your favorite recipes</p>
        </div>

        <!-- ✅ Restored Login Form -->
        <form class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" required
              class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-300"
              placeholder="your@email.com">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required
              class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-300"
              placeholder="••••••••">
          </div>

          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox"
              class="h-4 w-4 text-purple-500 focus:ring-purple-400 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
          </div>

          <div>
            <button type="button" id="loginButton"
              class="btn-hover-effect w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-white font-medium bg-purple-500 hover:bg-purple-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-400">
              Sign in
            </button>
          </div>
        </form>

        <div class="mt-6 text-center">
          <p class="text-sm text-gray-600">
            Don't have an account?
            <a href="SignUp.html" class="font-medium text-purple-500 hover:text-purple-600">Sign up now</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6">
    <div class="container mx-auto px-4 text-center">
      <span class="logo-text text-2xl">BASTA Desserts</span>
      <p class="text-gray-400 text-sm mt-1">Delicious recipes for every sweet tooth</p>
      <p class="text-gray-400 text-xs mt-4">&copy; 2025 BASTA Desserts. All rights reserved.</p>
    </div>
  </footer>

  <!-- Script -->
  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    if (togglePassword) {
      togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.classList.toggle('hidden');
        eyeOffIcon.classList.toggle('hidden');
      });
    }

    // Login button functionality
    const loginButton = document.getElementById('loginButton');
    loginButton.addEventListener('click', function () {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email && password) {
        alert('Login successful! Welcome to BASTA Desserts.');
      } else {
        alert('Please enter both email and password.');
      }
    });


  </script>
</body>
</html>
